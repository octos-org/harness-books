<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Harness Engineering Book</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f4;
      color: #191919;
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 72px 24px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 42px;
      line-height: 1.1;
      letter-spacing: 0;
    }
    p {
      max-width: 680px;
      font-size: 18px;
      line-height: 1.6;
      color: #4b4b45;
    }
    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-top: 32px;
    }
    a {
      display: block;
      padding: 18px 20px;
      border: 1px solid #d6d2c8;
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
      background: #fff;
    }
    a strong { display: block; font-size: 20px; margin-bottom: 6px; }
    a span { color: #666159; line-height: 1.45; }
    @media (prefers-color-scheme: dark) {
      body { background: #171717; color: #f3f0e8; }
      p { color: #c8c2b8; }
      a { background: #222; border-color: #3a3834; }
      a span { color: #b8b0a5; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Harness Engineering Book</h1>
    <p>Outline-synced Octos edition generated from the short Octos outline and the larger harness-engineering mdBook source.</p>
    <section class="links" aria-label="Book editions">
      <a href="./en/">
        <strong>English Outline Edition</strong>
        <span>Same synchronized book with the Octos outline as the table of contents.</span>
      </a>
      <a href="./zh/">
        <strong>中文纲要版</strong>
        <span>同一内容的中文导航版本，保留较大源书中的中文主体材料。</span>
      </a>
    </section>
  </main>
</body>
</html>
